<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Impera Vox Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="profile">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <nav class="menu" id="menu"></nav>
    </aside>

    <main class="main">
      <header class="header">
        <button class="menu-toggle" id="menuToggle" aria-label="Открыть меню">☰</button>
        <h1 class="title">Impera Vox</h1>
        <div class="header-user">
          <div class="user-card">
            <div class="avatar" id="userAvatar">ID</div>
            <div class="user-text">
              <div class="name" id="userName">Mr @username</div>
              <div class="id" id="userId"></div>
            </div>
          </div>
        </div>
      </header>

      <section class="page-card">
        <div class="page-title">Профиль</div>
        <div class="page-status" id="profileStatus"></div>
        <div class="profile-grid">
          <div class="profile-item">
            <div class="profile-item-label">Ник</div>
            <div class="profile-item-value" id="profileUsername">-</div>
          </div>
          <div class="profile-item">
            <div class="profile-item-label">Префикс</div>
            <div class="profile-item-value" id="profilePrefix">-</div>
          </div>
          <div class="profile-item">
            <div class="profile-item-label">Часовой пояс</div>
            <div class="profile-item-value" id="profileTimezone">-</div>
          </div>
        </div>
      </section>
      <footer class="app-footer">all rights reserved. ur impera vox</footer>
    </main>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <script src="common.js"></script>
  <script src="profile.js"></script>
</body>
</html>
